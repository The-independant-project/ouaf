{% extends "base.html" %}

{% block subtitle %} - Animaux{% endblock %}

{% block content %}
<h1>Animaux</h1>

<ul>
    {% for animal in animals %}
    <li>
        <a href="{% url 'animal_detail' animal.id %}">{{ animal.name }} {{ animal.description }}</a>
        {% for image in animal.images %}
            <img src="{{ image.image.url }}"/>
        {% endfor %}
    </li>
    <br/>
    {% endfor %}
</ul>
{% endblock %}
